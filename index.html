<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <div id="load-label" class="loader">Пожалуйста, подождите, загружаю комментарии...</div>

      <ul class="comments"></ul>

      <div class="add-form" id="add-form">
        <input type="text" class="add-form-name" placeholder="Введите ваше имя" />
        <textarea class="add-form-text" placeholder="Введите ваш коментарий" rows="4"></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>

      <div id="add-loader" class="loader" style="display: none;">Комментарий добавляется...</div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
